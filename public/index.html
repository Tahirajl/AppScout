<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AppScout — App Store Opportunity Finder</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141821;
    --panel-2: #1b2030;
    --border: #262d3d;
    --text: #e7ecf3;
    --muted: #8a93a6;
    --accent: #6ea8fe;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 24px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 20px; letter-spacing: 0.3px; }
  header small { color: var(--muted); margin-left: 10px; font-weight: normal; }
  main { padding: 28px 32px; max-width: 1300px; margin: 0 auto; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; }
  textarea {
    width: 100%; min-height: 140px; padding: 12px 14px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; resize: vertical;
    font-family: inherit; font-size: 14px; line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .actions { display: flex; gap: 10px; margin-top: 14px; align-items: center; }
  button {
    background: var(--accent); color: #0b0d12; border: 0; padding: 10px 18px;
    border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;
    transition: filter 0.15s ease;
  }
  button:hover:not(:disabled) { filter: brightness(1.08); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; display: none;
  }
  .spinner.active { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { color: var(--muted); font-size: 13px; }
  table {
    width: 100%; border-collapse: collapse; font-size: 14px;
  }
  th, td {
    text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--muted); font-weight: 600; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.5px;
    position: sticky; top: 0; background: var(--panel);
  }
  tbody tr:hover { background: var(--panel-2); }
  .score {
    display: inline-block; padding: 4px 10px; border-radius: 999px;
    font-weight: 700; font-size: 13px; min-width: 52px; text-align: center;
  }
  .score.green { background: rgba(46, 204, 113, 0.15); color: var(--green); }
  .score.yellow { background: rgba(241, 196, 15, 0.15); color: var(--yellow); }
  .score.red { background: rgba(231, 76, 60, 0.15); color: var(--red); }
  .tag {
    font-size: 11px; padding: 2px 6px; border-radius: 4px;
    background: rgba(46, 204, 113, 0.2); color: var(--green);
    margin-left: 6px; font-weight: 700;
  }
  .muted { color: var(--muted); }
  .empty {
    text-align: center; padding: 40px; color: var(--muted);
  }
  .error {
    color: var(--red); font-size: 13px; margin-top: 10px;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>AppScout <small>App Store opportunity finder</small></h1>
  </div>
  <div class="status" id="status"></div>
</header>
<main>
  <div class="card">
    <label for="keywords">Keywords (one per line)</label>
    <textarea id="keywords">habit tracker
pomodoro timer
grocery list
workout planner</textarea>
    <div class="actions">
      <button id="scanBtn">Scan</button>
      <button id="exportBtn" class="ghost" disabled>Export CSV</button>
      <span class="spinner" id="spinner"></span>
      <span class="status" id="progress"></span>
    </div>
    <div class="error" id="error"></div>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <div style="overflow-x:auto;">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Keyword</th>
            <th>Volume Proxy</th>
            <th>Top Competitor</th>
            <th>Reviews</th>
            <th>Rating</th>
            <th>Last Updated</th>
            <th>Opportunity Score</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <div class="empty" id="emptyState">
    Enter keywords above and click <strong>Scan</strong> to discover opportunities.
  </div>
</main>

<script>
  const scanBtn = document.getElementById('scanBtn');
  const exportBtn = document.getElementById('exportBtn');
  const spinner = document.getElementById('spinner');
  const progress = document.getElementById('progress');
  const errorEl = document.getElementById('error');
  const resultsCard = document.getElementById('resultsCard');
  const resultsBody = document.getElementById('resultsBody');
  const emptyState = document.getElementById('emptyState');

  let lastResults = [];

  function scoreClass(score) {
    if (score >= 70) return 'green';
    if (score >= 40) return 'yellow';
    return 'red';
  }

  function formatDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return d;
    return dt.toISOString().slice(0, 10);
  }

  function render(results) {
    resultsBody.innerHTML = '';
    results.forEach((r) => {
      const cls = scoreClass(r.opportunityScore || 0);
      const jackpot = (r.opportunityScore || 0) >= 70 ? '<span class="tag">JACKPOT</span>' : '';
      const row = document.createElement('tr');
      row.innerHTML = `
        <td><strong>${escapeHtml(r.keyword)}</strong></td>
        <td>${r.volumeProxy ?? '—'}</td>
        <td>${r.topCompetitor ? escapeHtml(r.topCompetitor) : '<span class="muted">—</span>'}</td>
        <td>${r.reviews !== null && r.reviews !== undefined ? r.reviews.toLocaleString() : '<span class="muted">—</span>'}</td>
        <td>${r.rating !== null && r.rating !== undefined ? r.rating.toFixed(2) : '<span class="muted">—</span>'}</td>
        <td>${formatDate(r.lastUpdated)}</td>
        <td><span class="score ${cls}">${r.opportunityScore ?? 0}</span>${jackpot}</td>
      `;
      resultsBody.appendChild(row);
    });
    resultsCard.style.display = 'block';
    emptyState.style.display = 'none';
    exportBtn.disabled = results.length === 0;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  async function scan() {
    const raw = document.getElementById('keywords').value;
    const keywords = raw.split('\n').map((k) => k.trim()).filter(Boolean);

    if (keywords.length === 0) {
      errorEl.textContent = 'Enter at least one keyword.';
      return;
    }

    errorEl.textContent = '';
    scanBtn.disabled = true;
    exportBtn.disabled = true;
    spinner.classList.add('active');
    progress.textContent = `Scanning ${keywords.length} keyword${keywords.length > 1 ? 's' : ''}…`;

    try {
      const res = await fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keywords }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      lastResults = data.results || [];
      render(lastResults);
      progress.textContent = `Scanned ${lastResults.length} keyword${lastResults.length > 1 ? 's' : ''}.`;
    } catch (err) {
      errorEl.textContent = 'Error: ' + err.message;
      progress.textContent = '';
    } finally {
      scanBtn.disabled = false;
      spinner.classList.remove('active');
    }
  }

  function exportCsv() {
    if (!lastResults.length) return;
    const headers = ['Keyword', 'Volume Proxy', 'Top Competitor', 'Reviews', 'Rating', 'Last Updated', 'Opportunity Score'];
    const lines = [headers.join(',')];
    lastResults.forEach((r) => {
      const row = [
        r.keyword,
        r.volumeProxy ?? '',
        r.topCompetitor || '',
        r.reviews ?? '',
        r.rating ?? '',
        r.lastUpdated || '',
        r.opportunityScore ?? '',
      ].map((v) => {
        const s = String(v).replace(/"/g, '""');
        return /[",\n]/.test(s) ? `"${s}"` : s;
      });
      lines.push(row.join(','));
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `appscout-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  scanBtn.addEventListener('click', scan);
  exportBtn.addEventListener('click', exportCsv);

  (async () => {
    try {
      const res = await fetch('/api/test');
      const data = await res.json();
      document.getElementById('status').textContent = data.ok
        ? `SerpApi connected (${data.resultCount} test results)`
        : `SerpApi error: ${data.error}`;
    } catch (e) {
      document.getElementById('status').textContent = 'Backend unreachable';
    }
  })();
</script>
</body>
</html>
